<!doctype html>
<html lang="en">

    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">

      <title>CONTACT</title>

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
      
      <script src="https://kit.fontawesome.com/d34125b423.js" crossorigin="anonymous"></script>

      <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
      
      <!-- Fonts -->

      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Rosarivo:ital@0;1&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

      <link href="styles.css" rel="stylesheet">

     <script>
        document.addEventListener('DOMContentLoaded', () => {

          const menuShell = document.querySelector('.menu-shell');
          const scrollWrapper = document.querySelector('.scroll-wrapper');
          const sections = document.querySelectorAll('.scroll-section');

          if (!menuShell || !scrollWrapper || !sections.length) return;

          /* =========================================
             SHRINK NAV ON SCROLL
          ========================================= */

          const updateNav = () => {

            const scrolled = scrollWrapper.scrollTop > 80;

            menuShell.classList.toggle('scrolled', scrolled);

          };

          scrollWrapper.addEventListener(
            'scroll',
            updateNav,
            { passive:true }
          );

          updateNav();

          /* =========================================
             DETERMINE ACTIVE SECTION
          ========================================= */

          function updateTheme() {

            const wrapperRect = scrollWrapper.getBoundingClientRect();

            let closestSection = null;
            let smallestDistance = Infinity;

            sections.forEach(section => {

              const rect = section.getBoundingClientRect();

              const distance = Math.abs(
                rect.top - wrapperRect.top
              );

              if (distance < smallestDistance) {

                smallestDistance = distance;
                closestSection = section;

              }

            });

            if (!closestSection) return;

            menuShell.classList.remove('light-ui');

            if (
              closestSection.classList.contains('theme-dark')
            ) {
              menuShell.classList.add('light-ui');
            }

          }

          /* =========================================
             THROTTLED SCROLL
          ========================================= */

          let ticking = false;

          scrollWrapper.addEventListener('scroll', () => {

            if (!ticking) {

              window.requestAnimationFrame(() => {

                updateTheme();

                ticking = false;

              });

              ticking = true;

            }

          }, { passive:true });

          updateTheme();

          /* =========================================
             FADE IN CONTENT
          ========================================= */

          const observer = new IntersectionObserver((entries) => {

            entries.forEach(entry => {

              if (entry.isIntersecting) {

                entry.target.classList.add('visible');

            } else {
                entry.target.classList.remove('visible')
            }

            });

          }, {
            threshold:0.3
          });

          document.querySelectorAll('.fade-in').forEach(el => {

            observer.observe(el);

          });

        });
      </script>

    </head>
    
    <body>
        
      <nav class="navbar navbar-dark fixed-top">

            <div class="menu-shell">
              
              <!-- HAMBURGER -->

              <input type="checkbox" id="menu-toggle" />

              <!-- SOCIAL ICONS -->

              <div class="social-icons">

                <label for="menu-toggle"
                       class="hamburger"
                       aria-label="Open menu">

                  <span></span>
                  <span></span>
                  <span></span>

                </label>

              </div>

              <!-- OVERLAY -->

              <label for="menu-toggle" class="menu-overlay"></label>

              <!-- MENU -->

              <nav class="menu-panel">

                <a href="index.html" class="nav-link py-2">
                  Home
                </a>

                <a href="portfolio.html" class="nav-link py-2">
                  Portfolio
                </a>

                <a href="about.html" class="nav-link py-2">
                  About Me</a>

                <a href="contact.html" class="nav-link py-2">
                  Contact
                </a>

              </nav>

            </div>

          </nav>
      
      <article class="scroll-wrapper">
            
            <section class="scroll-section section-light theme-light">
              <div class="section-content contact-layout fade-in">

                  <!-- LEFT SIDE -->
                  <div class="contact-text">

                      <h1 class="page-title section-title">
                          CONTACT
                      </h1>

                      <p>
                          If you’re interested in collaborating or discussing potential opportunities, please don’t hesitate to get in touch!
                      </p>

                  </div>

                  <!-- RIGHT SIDE -->
                  <div class="contact-icons">

                      <a href="https://www.instagram.com/powelljo.99/">
                          <i class="bi bi-instagram"></i>
                      </a>

                      <a href="https://www.linkedin.com/in/jacksonpowell-design/">
                          <i class="bi bi-linkedin"></i>
                      </a>

                      <a href="https://jopowelldesign.itch.io">
                          <i class="fa-brands fa-itch-io"></i>
                      </a>

                  </div>

              </div>
              
              <div class="scroll-indicator down">
                  <i class="bi bi-chevron-down"></i>
              </div>
            
                <div class="section-divider divider-blue"></div>
            </section>
        
            <section class="scroll-section section-blue theme-dark">

                <div class="section-content inquiry-section fade-in">

                    <h2 class="section-title">
                        SEND AN INQUIRY
                    </h2>

                    <form class="inquiry-form">

                        <input type="text" placeholder="Your Name" required="">

                        <input type="email"
                               placeholder="Your Email"
                               required>

                        <input type="text"
                               placeholder="Subject">

                        <textarea placeholder="Your Message"
                                  rows="6"
                                  required></textarea>

                        <button type="submit">
                            Send Message
                        </button>

                    </form>

                </div>
              
                <div class="scroll-indicator up">
                    <i class="bi bi-chevron-up"></i>
                </div>

                <div class="section-divider divider-light"></div>

            </section>
            
        </article>
        
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        
    </body>
    
</html>
